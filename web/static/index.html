<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterEgo Browser Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decorations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🌐</span>
                <div class="logo-text">
                    <h1>AlterEgo</h1>
                    <p>Anti-detect Browser</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-new-profile" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    New Profile
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="section-header">
                <h2>Profiles (<span id="profile-count">0</span>)</h2>
            </div>
            
            <div id="profiles-list" class="profiles-grid">
                <!-- Profiles will be dynamically injected here -->
            </div>

            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">🌐</div>
                <h3>No profiles yet</h3>
                <p>Click New Profile to get started.</p>
            </div>
        </main>
    </div>

    <!-- Modal for Edit Profile -->
    <div id="edit-modal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Edit Profile</h3>
                <button id="btn-close-modal" class="btn-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="profile-form">
                    <input type="hidden" id="profile-id">
                    <div class="form-group">
                        <label>Profile Name</label>
                        <input type="text" id="profile-name" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Proxy Type</label>
                            <select id="proxy-type">
                                <option value="">None (Direct Connection)</option>
                                <option value="http">HTTP</option>
                                <option value="socks5">SOCKS5</option>
                            </select>
                        </div>
                    </div>

                    <div class="proxy-fields" id="proxy-fields">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Host</label>
                                <input type="text" id="proxy-host" placeholder="e.g. 192.168.1.1">
                            </div>
                            <div class="form-group">
                                <label>Port</label>
                                <input type="number" id="proxy-port" placeholder="e.g. 1080">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="proxy-user">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="proxy-pass">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="btn-cancel-edit" class="btn btn-secondary">Cancel</button>
                <button id="btn-save-profile" class="btn btn-primary">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
